<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EL RETRATO DE TOH FOTOGRAFÍA | Mérida, Yucatán</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
  font-family: 'Montserrat', sans-serif;
      background-color: #f0f2f5;
      color: #1e3a5f;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: white;
    }

    header img {
      height: 80px;
    }

    .hamburger {
      font-size: 28px;
      cursor: pointer;
      color: #1e3a5f;
    }

    /* INICIO */
    .inicio {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 80px 40px;
      min-height: 90vh;
    }

    .inicio img {
      width: 650px;
    }

    .inicio-logo {
  border-right: 1px solid #c0c8d0;
  padding-right: 60px;
}

    .inicio-texto {
      max-width: 450px;
      text-align: center;
    }

    .inicio-texto h1 {
  font-size: 2.8rem;
  font-weight: 600;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 1px;
      margin-bottom: 20px;
      color: #1e3a5f;
    }

    .inicio-texto p {
      font-size: 1rem;
      color: #5a7a9f;
      margin-bottom: 15px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 30px;
      background-color: #3d5a7a;
      color: white;
      border-radius: 30px;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    .redes {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 25px;
    }

    .redes a {
      width: 40px;
      height: 40px;
      background: #e8eaed;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #1e3a5f;
      font-size: 16px;
    }
    @media (max-width: 768px) {
  .inicio {
    flex-direction: column;
    padding: 40px 20px;
    gap: 30px;
  }

  .inicio-logo {
    border-right: none;
    border-bottom: 1px solid #c0c8d0;
    padding-right: 0;
    padding-bottom: 30px;
  }

  .inicio img {
    width: 280px;
  }

  .inicio-texto h1 {
    font-size: 2rem;
  }

  .inicio-texto {
    max-width: 100%;
  }
}

  </style>
</head>
<body>


  <!-- INICIO -->
  <section class="inicio">
    <div class="inicio-logo">
  <img src="logo.png" alt="Logo grande">
</div>
    <div class="inicio-texto">
      <h1>El Retrato de Toh</h1>
      <p>Retratos creados con intención, luz y presencia.<br>
      Imágenes atemporales que resguardan lo esencial.</p>
      <p>Una práctica fotográfica íntima, guiada por la calma y la elegancia de Mérida, Yucatán.</p>
      <a href="contacto.html" class="btn">Solicita tu sesión privada</a>
      <div class="redes">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fas fa-envelope"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
      </div>      
    </div>
  </section>

</body>
</html>
