<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EL RETRATO DE TOH FOTOGRAFÍA | Mérida, Yucatán</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background-color: #f0f2f5;
      color: #1e3a5f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .inicio {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      padding: 60px 40px;
      width: 100%;
      max-width: 1100px;
    }

    .inicio-logo img {
      width: 460px;
    }

    .inicio-logo {
      border-right: 1px solid #b0bec5;
      padding-right: 80px;
    }

    .inicio-texto {
      max-width: 420px;
      text-align: center;
    }

    .inicio-texto h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 400;
      margin-bottom: 25px;
      color: #1e3a5f;
      line-height: 1.2;
    }

    .inicio-texto p {
      font-family: 'Raleway', sans-serif;
      font-size: 0.95rem;
      color: #5a7a9f;
      margin-bottom: 15px;
      line-height: 1.8;
      font-weight: 300;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 16px 45px;
      background-color: #3d5a7a;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.85rem;
      font-family: 'Raleway', sans-serif;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .redes {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 25px;
    }

    .redes a {
      width: 42px;
      height: 42px;
      background: #e2e5ea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #1e3a5f;
      font-size: 15px;
    }

    /* CELULAR */
    @media (max-width: 768px) {
      .inicio {
        flex-direction: column;
        gap: 30px;
        padding: 50px 25px;
      }

      .inicio-logo {
        border-right: none;
        border-bottom: 1px solid #b0bec5;
        padding-right: 0;
        padding-bottom: 30px;
      }

      .inicio-logo img {
        width: 660px;
      }

      .inicio-texto h1 {
        font-size: 2.2rem;
      }

      .inicio-texto {
        max-width: 100%;
      }
    }

  </style>
</head>
<body>

  <section class="inicio">
    <div class="inicio-logo">
      <img src="logo.png" alt="El Retrato de Toh">
    </div>
    <div class="inicio-texto">
      <h1>El Retrato de Toh</h1>
      <p>Retratos creados con intención, luz y presencia.<br>
      Imágenes atemporales que resguardan lo esencial.</p>
      <p>Una práctica fotográfica íntima, guiada por la calma y la elegancia de Mérida, Yucatán.</p>
      <a href="contacto.html" class="btn">Solicita tu sesión privada</a>
      <div class="redes">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fas fa-envelope"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
      </div>
    </div>
  </section>

</body>
</html>
